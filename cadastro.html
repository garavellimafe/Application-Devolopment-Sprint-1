<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VegeTrack - Motiva</title>
    <link rel="stylesheet" href="cadastro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <header>
        <div class="header-container">
            <div class="logo">
                <i class="fas fa-truck"></i>
                <h1>VegeTrack - Motiva</h1>
            </div>
            <nav>
                <div class="nav-container">
                    <a href="inicio.html" class="nav-link">
                        <i class="fas fa-home"></i>
                        <span>Início</span>
                    </a>
                    <a href="cadastro.html" class="nav-link">
                        <i class="fas fa-user-plus"></i>
                        <span>Cadastro</span>
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <section id="cadastro">
            <h2>Cadastro de Motorista</h2>
            
            <form id="formCadastro">
                <fieldset>
                    <legend>Dados Pessoais</legend>
                    
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
                    
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
                    
                    <label for="telefone">Telefone:</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="(XX) XXXXX-XXXX" required>
                    
                    <label for="cpf">CPF:</label>
                    <input type="text" id="cpf" name="cpf" placeholder="XXX.XXX.XXX-XX" required>
                    
                    <label for="dataNascimento">Data de Nascimento:</label>
                    <input type="date" id="dataNascimento" name="dataNascimento" required>
                </fieldset>

                <fieldset>
                    <legend>Dados de Endereço</legend>
                    
                    <label for="rua">Rua:</label>
                    <input type="text" id="rua" name="rua" placeholder="Nome da rua" required>
                    
                    <label for="numero">Número:</label>
                    <input type="text" id="numero" name="numero" placeholder="Número" required>
                    
                    <label for="bairro">Bairro:</label>
                    <input type="text" id="bairro" name="bairro" placeholder="Bairro" required>
                    
                    <label for="cidade">Cidade:</label>
                    <input type="text" id="cidade" name="cidade" placeholder="Cidade" required>
                    
                    <label for="estado">Estado:</label>
                    <select id="estado" name="estado" required>
                        <option value="">Selecione um estado</option>
                        <option value="AC">Acre</option>
                        <option value="AL">Alagoas</option>
                        <option value="AP">Amapá</option>
                        <option value="AM">Amazonas</option>
                        <option value="BA">Bahia</option>
                        <option value="CE">Ceará</option>
                        <option value="DF">Distrito Federal</option>
                        <option value="ES">Espírito Santo</option>
                        <option value="GO">Goiás</option>
                        <option value="MA">Maranhão</option>
                        <option value="MT">Mato Grosso</option>
                        <option value="MS">Mato Grosso do Sul</option>
                        <option value="MG">Minas Gerais</option>
                        <option value="PA">Pará</option>
                        <option value="PB">Paraíba</option>
                        <option value="PR">Paraná</option>
                        <option value="PE">Pernambuco</option>
                        <option value="PI">Piauí</option>
                        <option value="RJ">Rio de Janeiro</option>
                        <option value="RN">Rio Grande do Norte</option>
                        <option value="RS">Rio Grande do Sul</option>
                        <option value="RO">Rondônia</option>
                        <option value="RR">Roraima</option>
                        <option value="SC">Santa Catarina</option>
                        <option value="SP">São Paulo</option>
                        <option value="SE">Sergipe</option>
                        <option value="TO">Tocantins</option>
                    </select>
                </fieldset>

                <fieldset>
                    <legend>Dados Profissionais</legend>
                    
                    <label for="cnh">CNH:</label>
                    <input type="text" id="cnh" name="cnh" placeholder="Número da CNH" required>
                    
                    <label for="categoriaCNH">Categoria da CNH:</label>
                    <select id="categoriaCNH" name="categoriaCNH" required>
                        <option value="">Selecione uma categoria</option>
                        <option value="A">A - Motocicleta</option>
                        <option value="B">B - Automóvel</option>
                        <option value="C">C - Caminhão</option>
                        <option value="D">D - Ônibus</option>
                        <option value="E">E - Reboque</option>
                    </select>
                    
                    <label for="validadeCNH">Validade da CNH:</label>
                    <input type="date" id="validadeCNH" name="validadeCNH" required>
                    
                    <label for="experiencia">Anos de Experiência:</label>
                    <input type="number" id="experiencia" name="experiencia" min="0" placeholder="Digite o número de anos" required>
                </fieldset>

                <fieldset>
                    <legend>Termos e Condições</legend>
                    
                    <label>
                        <input type="checkbox" id="aceite" name="aceite" required>
                        Aceito os termos e condições da plataforma
                    </label>
                </fieldset>

                <button type="submit" class="btn-submit">Cadastrar Motorista</button>
                <p id="mensagem"></p>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 - VegeTrack - Motiva</p>
    </footer>

    <script src="cadastro.js"></script>

</body>
</html>
